<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文野環 | にじさんじアーカイブ</title>
    <link rel="stylesheet" href="char-base.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="bg-fx"></div>
    <nav class="nav">
        <a href="../nijisanji_index.html" class="nav-brand">NIJISANJI ARCHIVE</a>
    </nav>

    <header class="hero">
        <h1 class="hero-name">文野環</h1>
        <p class="hero-subtitle">Fumino Tamaki</p>
    </header>

    <main class="container">
        <section class="section reveal">
            <h2 class="section-title">PROFILE</h2>
            <div class="profile-card">
                <div class="data-grid">
                    <div class="data-item"><span class="label">Birthday</span><span class="value">7月30日</span></div>
                    <div class="data-item"><span class="label">Debut</span><span class="value">2018年3月15日</span></div>
                    <div class="data-item"><span class="label">Gen</span><span class="value">2期生 (野良猫)</span></div>
                </div>
            </div>
        </section>

        <section class="section reveal">
            <h2 class="section-title">DESCRIPTION</h2>
            <div class="description">
                <p>猫。通称「野良猫」。自由奔放すぎる性格で、数々の配信事故（？）や伝説的エピソードを持つ。予測不能な行動と発言で、にじさんじ内外を問わず愛されている唯一無二の存在。</p>
            </div>
        </section>
    </main>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>

</html>
