<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>伏見ガク | にじさんじアーカイブ</title>
    <link rel="stylesheet" href="char-base.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="bg-fx"></div>
    <nav class="nav">
        <a href="../nijisanji_index.html" class="nav-brand">NIJISANJI ARCHIVE</a>
    </nav>

    <header class="hero">
        <h1 class="hero-name">伏見ガク</h1>
        <p class="hero-subtitle">Fushimi Gaku</p>
    </header>

    <main class="container">
        <section class="section reveal">
            <h2 class="section-title">PROFILE</h2>
            <div class="profile-card">
                <div class="data-grid">
                    <div class="data-item"><span class="label">Birthday</span><span class="value">10月5日</span></div>
                    <div class="data-item"><span class="label">Debut</span><span class="value">2018年3月15日</span></div>
                    <div class="data-item"><span class="label">Gen</span><span class="value">2期生 (咎人)</span></div>
                </div>
            </div>
        </section>

        <section class="section reveal">
            <h2 class="section-title">DESCRIPTION</h2>
            <div class="description">
                <p>20歳の大学生。ポジティブで明るい性格。朝配信「おはガク」でリスナーに元気を与えている。剣持刀也とのユニット「咎人」としても高い人気を誇る。パチンコ好きという意外な一面も。</p>
            </div>
        </section>
    </main>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>

</html>
