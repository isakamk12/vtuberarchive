<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紡木こかげ - VSPO! Record</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&family=Noto+Sans+JP:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="char-base.css">
    <style>
        :root {
            --char-primary: #98fb98;
            /* Pale Green */
            --char-primary-rgb: 152, 251, 152;
            --char-secondary: #00f3ff;
        }
    </style>
</head>

<body class="char-theme">
    <div class="char-bg"></div>
    <header class="char-header">
        <a href="../vspo_index.html" class="back-link"><i class="fa-solid fa-chevron-left"></i> BACK TO ROSTER</a>
        <div class="char-logo">VSPO!</div>
    </header>

    <main class="char-container">
        <aside class="info-sidebar">
            <div class="avatar-box">
                <i class="fa-solid fa-gamepad"></i>
            </div>
            <div class="quick-stats">
                <div class="stat-row"><span class="stat-label">BIRTHDAY</span><span class="stat-value">Oct 26</span>
                </div>
                <div class="stat-row"><span class="stat-label">FAN NAME</span><span class="stat-value">こもれび</span></div>
            </div>
        </aside>

        <section class="detail-content">
            <div class="char-title">
                <h1>Kokage Tsumugi</h1>
                <div class="unit">AGENT // VSPO! JP</div>
            </div>

            <div class="data-card">
                <h2><i class="fa-solid fa-crosshairs"></i> GAME STYLE & ACHIEVEMENTS</h2>
                <p>アークナイツなどのゲームを好み、落ち着いた声とトーンで配信を行っている。</p>
                <div class="tag-list">
                    <span>Arknights</span><span>FPS</span>
                </div>
            </div>

            <div class="data-card">
                <h2><i class="fa-solid fa-id-card"></i> PERSONALITY & TRIVIA</h2>
                <p>落ち着いた雰囲気を持つ。先輩へのリスペクトも深く、デビュー初配信では先輩一人ひとりについて丁寧に語っていた。</p>
                <p>藍沢エマの声を「透明感の塊」と絶賛している。</p>
            </div>
        </section>
    </main>
</body>

</html>
