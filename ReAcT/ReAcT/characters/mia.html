<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水瓶ミア | Re:AcT Archive</title>
    <link rel="stylesheet" href="char-base.css">
</head>

<body>
    <div class="bg-glow"></div>
    <nav class="nav">
        <a href="../react_index.html" class="nav-brand">RE:ACT ARCHIVE</a>
    </nav>

    <header class="hero">
        <h1 class="hero-name">Mia</h1>
        <p class="hero-subtitle">水瓶ミア</p>
    </header>

    <main class="container">
        <section class="section reveal">
            <h2 class="section-title">PROFILE</h2>
            <div class="profile-card">
                <div class="data-grid">
                    <div class="data-item"><span class="label">ID</span><span class="value">REA-003</span></div>
                    <div class="data-item"><span class="label">STATUS</span><span class="value">MAIN</span></div>
                </div>
            </div>
        </section>

        <section class="section reveal">
            <h2 class="section-title">DESCRIPTION</h2>
            <div class="description">
                <p>Re:AcT所属のタレント。水のようにしなやかで、かつ芯の強さを感じさせるトークが特徴。多様なバックグラウンドを持ち、その豊かな経験を活かした配信内容でリスナーの信頼を集めている。</p>
            </div>
        </section>
    </main>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>

</html>
