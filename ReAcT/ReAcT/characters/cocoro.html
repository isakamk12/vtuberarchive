<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桃犬こころ | Re:AcT Archive</title>
    <link rel="stylesheet" href="char-base.css">
</head>

<body>
    <div class="bg-glow"></div>
    <nav class="nav">
        <a href="../react_index.html" class="nav-brand">RE:ACT ARCHIVE</a>
    </nav>

    <header class="hero">
        <h1 class="hero-name">Cocoro</h1>
        <p class="hero-subtitle">桃犬こころ</p>
    </header>

    <main class="container">
        <section class="section reveal">
            <h2 class="section-title">PROFILE</h2>
            <div class="profile-card">
                <div class="data-grid">
                    <div class="data-item"><span class="label">ID</span><span class="value">REG-003</span></div>
                    <div class="data-item"><span class="label">STATUS</span><span class="value">GAMING</span></div>
                </div>
            </div>
        </section>

        <section class="section reveal">
            <h2 class="section-title">DESCRIPTION</h2>
            <div class="description">
                <p>Re:AcT Gaming所属のタレント。愛くるしい「桃犬」の名の通り、リスナーの心を癒やす元気いっぱいの実況が魅力。ゲームを通じた楽しさを全力で発信し、多くのファンに笑顔を届けている。</p>
            </div>
        </section>
    </main>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>

</html>
