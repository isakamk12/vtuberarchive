<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terra404 | V4Mirai Archive</title>
    <link rel="stylesheet" href="char-base.css">
</head>

<body>
    <header class="hero">
        <h1 class="hero-name">TERRA</h1>
        <p class="hero-subtitle">Terra404</p>
    </header>

    <main class="container">
        <section class="section reveal">
            <h2 class="section-title">PROFILE</h2>
            <div class="profile-card">
                <div class="data-grid">
                    <div class="data-item"><span class="label">UNIT</span><span class="value">Voltail</span></div>
                    <div class="data-item"><span class="label">ID</span><span class="value">VOLT-01</span></div>
                </div>
            </div>
        </section>

        <section class="section reveal">
            <h2 class="section-title">DESCRIPTION</h2>
            <div class="description">
                <p>V4Miraiの第2世代（Voltail）メンバー。エラーコードを冠した名の通り、予測不能なバグのようにリスナーを驚かせる存在。圧倒的なスキルと、デジタルネイティブ世代らしい鋭い感性で、バーチャルの限界を押し広げている。
                </p>
            </div>
        </section>
    </main>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>

</html>
