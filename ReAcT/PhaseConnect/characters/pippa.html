<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipkin Pippa | Phase Connect Archive</title>
    <link rel="stylesheet" href="char-base.css">
</head>

<body class="chaos-theme">
    <div class="bg-fx"></div>
    <nav class="nav">
        <a href="../phaseconnect_index.html" class="nav-brand">PHASE CONNECT ARCHIVE</a>
    </nav>

    <header class="hero">
        <h1 class="hero-name">Pipkin Pippa</h1>
        <p class="hero-subtitle">ピップキン ピッパ</p>
    </header>

    <main class="container">
        <section class="section reveal">
            <h2 class="section-title">PROFILE</h2>
            <div class="profile-card">
                <div class="data-grid">
                    <div class="data-item"><span class="label">ID</span><span class="value">PH-01-01</span></div>
                    <div class="data-item"><span class="label">Phase</span><span class="value">01 - OriginS</span></div>
                    <div class="data-item"><span class="label">Chaos Level</span><span class="value">MAX</span></div>
                </div>
            </div>
        </section>

        <section class="section reveal">
            <h2 class="section-title">DESCRIPTION</h2>
            <div class="description">
                <p>OriginSのメンバー。極度の不眠症、陰謀論への興味、そして予測不能な言動で「カオス」を体現するウサギの少女。Phase Connectの「混沌」としたブランドイメージを確立した象徴的な存在である。
                </p>
            </div>
        </section>
    </main>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>

</html>
