<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>息根とめる | SHINSOGUMI Archive</title>
    <link rel="stylesheet" href="char-base.css">
</head>

<body>
    <nav class="nav">
        <a href="../shinsogumi_index.html" class="nav-brand">SHINSOGUMI_DATABASE</a>
    </nav>

    <header class="hero">
        <h1 class="hero-name">TOMERU</h1>
        <p class="hero-subtitle">息根とめる</p>
    </header>

    <main class="container">
        <section class="section reveal">
            <h2 class="section-title">SYSTEM_PROFILE</h2>
            <div class="profile-card">
                <div class="data-grid">
                    <div class="data-item"><span class="label">ROLE</span><span class="value">5TH_DAUGHTER</span></div>
                    <div class="data-item"><span class="label">NODE_ID</span><span class="value">TMR-05</span></div>
                </div>
            </div>
        </section>

        <section class="section reveal">
            <h2 class="section-title">LOG_CONTENT</h2>
            <div class="description">
                <p>深層家の五女。圧倒的なエネルギーと、歯に衣着せぬトークが最大の武器。常にリスナーとの真剣勝負を繰り広げ、その熱量は深層組の中でも随一。彼女の配信は、まさに生きる力を爆発させる場所となっている。</p>
            </div>
        </section>
    </main>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>

</html>
