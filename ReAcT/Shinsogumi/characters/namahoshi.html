<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>なまほしちゃん | SHINSOGUMI Archive</title>
    <link rel="stylesheet" href="char-base.css">
</head>

<body>
    <nav class="nav">
        <a href="../shinsogumi_index.html" class="nav-brand">SHINSOGUMI_DATABASE</a>
    </nav>

    <header class="hero">
        <h1 class="hero-name">NAMAHOSHI</h1>
        <p class="hero-subtitle">なまほしちゃん</p>
    </header>

    <main class="container">
        <section class="section reveal">
            <h2 class="section-title">SYSTEM_PROFILE</h2>
            <div class="profile-card">
                <div class="data-grid">
                    <div class="data-item"><span class="label">ROLE</span><span class="value">3RD_DAUGHTER</span></div>
                    <div class="data-item"><span class="label">NODE_ID</span><span class="value">NHS-03</span></div>
                </div>
            </div>
        </section>

        <section class="section reveal">
            <h2 class="section-title">LOG_CONTENT</h2>
            <div class="description">
                <p>深層家の三女。独特のゆるい雰囲気と、予測不能な言動でリスナーを翻弄する。自由奔放な配信スタイルでありながら、時折見せる鋭い観察眼と、深層組らしい尖った感性がファンを惹きつけてやまない。</p>
            </div>
        </section>
    </main>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>

</html>
