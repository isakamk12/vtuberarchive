<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夏渚 まはろ | Palette Project アーカイブ</title>
    <link rel="stylesheet" href="char-base.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="bg-fx"></div>
    <nav class="nav">
        <a href="../paletteproject_index.html" class="nav-brand">PALETTE PROJECT ARCHIVE</a>
    </nav>

    <header class="hero">
        <h1 class="hero-name">夏渚 まはろ</h1>
        <p class="hero-subtitle">Sanagi Maharo</p>
    </header>

    <main class="container">
        <section class="section reveal">
            <h2 class="section-title">PROFILE</h2>
            <div class="profile-card">
                <div class="data-grid">
                    <div class="data-item"><span class="label">Gen</span><span class="value">5期生 (正規メンバー)</span></div>
                    <div class="data-item"><span class="label">Status</span><span class="value">2026年2月昇格</span></div>
                </div>
            </div>
        </section>

        <section class="section reveal">
            <h2 class="section-title">DESCRIPTION</h2>
            <div class="description">
                <p>パレプロの5期生。2026年2月に研究生から正規メンバーへ昇格した。研究生制度の成功モデルとして、努力と実績を積み重ねて掴み取った正規メンバーの座。同期やファンからの厚い信頼を背に、新たなステージへと踏み出す。
                </p>
            </div>
        </section>
    </main>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>

</html>
