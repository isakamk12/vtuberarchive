<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Henya the Genius | VShojo Archive</title>
    <link rel="stylesheet" href="char-base.css">
</head>

<body>
    <header class="hero">
        <h1 class="hero-name">HENYA</h1>
        <p class="hero-subtitle">IQ 999+ / THE GENIUS</p>
    </header>

    <main class="container">
        <section class="section reveal">
            <h2 class="section-label">IDENTIFIER</h2>
            <div class="profile-card">
                <div class="data-grid">
                    <div class="data-item"><span class="label">GROUP</span><span class="value">JAPAN / NOVA</span></div>
                    <div class="data-item"><span class="label">STATUS</span><span class="value">ACTIVE</span></div>
                </div>
            </div>
        </section>

        <section class="section reveal">
            <h2 class="section-label">RECORDS</h2>
            <div class="description">
                <p>VShojo
                    Japan所属。自称IQ999を超える天才。毒舌でありながら、どこか憎めないキャラクターと、鋭いゲームセンスが持ち味。彼女のハイテンションな配信は、多くの「観測者」たちに衝撃と笑いを与えている。ゼン！
                </p>
            </div>
        </section>
    </main>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>

</html>
