<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miori Celesta | Tsunderia Archive</title>
    <link rel="stylesheet" href="char-base.css">
</head>

<body>
    <header class="hero">
        <h1 class="hero-name">Celesta</h1>
        <p class="hero-subtitle">ミオリ・セレスタ</p>
    </header>

    <main class="container">
        <section class="section reveal">
            <h2 class="section-title">PROFILE</h2>
            <div class="profile-card">
                <div class="data-grid">
                    <div class="data-item"><span class="label">UNIT</span><span class="value">Generation 1</span></div>
                    <div class="data-item"><span class="label">TYPE</span><span class="value">GLOBAL_STAR</span></div>
                </div>
            </div>
        </section>

        <section class="section reveal">
            <h2 class="section-title">DESCRIPTION</h2>
            <div class="description">
                <p>Tsunderiaの1期生（TsunQuest Party）。圧倒的な歌唱唱と、グローバルな活動で知られる。力強いパフォーマンスと、リスナーへの献身的な姿勢が、彼女を真のスターに押し上げている。</p>
            </div>
        </section>
    </main>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>

</html>
