<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>狛犬うめ | Varium Archive</title>
    <link rel="stylesheet" href="char-base.css">
</head>

<body>
    <header class="hero">
        <h1 class="hero-name">UME</h1>
        <p class="hero-subtitle">狛犬うめ / Komainu Ume</p>
    </header>

    <main class="container">
        <section class="section reveal">
            <h2 class="section-title">PROFILE</h2>
            <div class="profile-card">
                <div class="data-grid">
                    <div class="data-item"><span class="label">GEN</span><span class="value">1期生</span></div>
                    <div class="data-item"><span class="label">ID</span><span class="value">VAR-01-01</span></div>
                </div>
            </div>
        </section>

        <section class="section reveal">
            <h2 class="section-title">STORY</h2>
            <div class="description">
                <p>ぶいありうむっ！1期生。神社の狛犬として人々の願いを見守ってきた。元気一杯で、リスナーに笑顔と元気を届けることが一番の喜び。彼女の周りにはいつも明るい星々が輝いているような、温かい雰囲気が溢れている。
                </p>
            </div>
        </section>
    </main>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>

</html>
