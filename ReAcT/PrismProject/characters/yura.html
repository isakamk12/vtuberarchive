<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六道ユラ | PRISM Project Archive</title>
    <link rel="stylesheet" href="char-base.css">
</head>

<body>
    <div class="bg-refract"></div>
    <nav class="nav">
        <a href="../prismproject_index.html" class="nav-brand">PRISM PROJECT ARCHIVE</a>
    </nav>

    <header class="hero">
        <h1 class="hero-name">六道ユラ</h1>
        <p class="hero-subtitle">RIKUDOU YURA</p>
    </header>

    <main class="container">
        <section class="section reveal">
            <h2 class="section-title">PROFILE</h2>
            <div class="profile-card">
                <div class="data-grid">
                    <div class="data-item"><span class="label">GEN</span><span class="value">3期生</span></div>
                    <div class="data-item"><span class="label">ID</span><span class="value">PRM-03-03</span></div>
                </div>
            </div>
        </section>

        <section class="section reveal">
            <h2 class="section-title">DESCRIPTION</h2>
            <div class="description">
                <p>PRISM Projectの3期生。エッジの効いたキャラクターと、予測不能な面白さがリスナーに受けている。自身のスタイルを貫く姿勢と、時折見せる真摯な一面のギャップが魅力。</p>
            </div>
        </section>
    </main>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>

</html>
