<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoshino Charlotte | Tsunderia Archive</title>
    <link rel="stylesheet" href="char-base.css">
</head>

<body>
    <header class="hero">
        <h1 class="hero-name">Charlotte</h1>
        <p class="hero-subtitle">星野シャルロット</p>
    </header>

    <main class="container">
        <section class="section reveal">
            <h2 class="section-title">PROFILE</h2>
            <div class="profile-card">
                <div class="data-grid">
                    <div class="data-item"><span class="label">UNIT</span><span class="value">Generation 0</span></div>
                    <div class="data-item"><span class="label">TYPE</span><span class="value">ROYAL_TSUN</span></div>
                </div>
            </div>
        </section>

        <section class="section reveal">
            <h2 class="section-title">DESCRIPTION</h2>
            <div class="description">
                <p>Tsunderiaの0期生。気品溢れる立ち振る舞いと、お嬢様のような言葉遣いが特徴。一見すると近寄りがたいオーラを放っているが、実は寂しがり屋な一面もあり、そのギャップが彼女の最大の魅力となっている。
                </p>
            </div>
        </section>
    </main>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>

</html>
