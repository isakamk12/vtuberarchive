<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gram Pico | Phase Connect Archive</title>
    <link rel="stylesheet" href="char-base.css">
</head>

<body>
    <div class="bg-fx"></div>
    <nav class="nav">
        <a href="../phaseconnect_index.html" class="nav-brand">PHASE CONNECT ARCHIVE</a>
    </nav>

    <header class="hero">
        <h1 class="hero-name">Gram Pico</h1>
        <p class="hero-subtitle">倉夢 ぴこ</p>
    </header>

    <main class="container">
        <section class="section reveal">
            <h2 class="section-title">PROFILE</h2>
            <div class="profile-card">
                <div class="data-grid">
                    <div class="data-item"><span class="label">ID</span><span class="value">PH-JP-03</span></div>
                    <div class="data-item"><span class="label">Phase</span><span class="value">KALEiDO (JP 1期生)</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="section reveal">
            <h2 class="section-title">DESCRIPTION</h2>
            <div class="description">
                <p>KALEiDOのメンバー。お菓子作りが大好きな少女。可愛らしい外見と、時折見せるお茶目な言動が魅力。リスナーを「Pico-mates」と呼び、甘くて楽しい時間を提供している。</p>
            </div>
        </section>
    </main>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>

</html>
