<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utatane Nasa | Phase Connect Archive</title>
    <link rel="stylesheet" href="char-base.css">
</head>

<body>
    <div class="bg-fx"></div>
    <nav class="nav">
        <a href="../phaseconnect_index.html" class="nav-brand">PHASE CONNECT ARCHIVE</a>
    </nav>

    <header class="hero">
        <h1 class="hero-name">Utatane Nasa</h1>
        <p class="hero-subtitle">転寝 ナサ</p>
    </header>

    <main class="container">
        <section class="section reveal">
            <h2 class="section-title">PROFILE</h2>
            <div class="profile-card">
                <div class="data-grid">
                    <div class="data-item"><span class="label">ID</span><span class="value">PH-01-05</span></div>
                    <div class="data-item"><span class="label">Phase</span><span class="value">01 - OriginS</span></div>
                </div>
            </div>
        </section>

        <section class="section reveal">
            <h2 class="section-title">DESCRIPTION</h2>
            <div class="description">
                <p>OriginSのメンバー。ナマケモノの少女。「転寝（うたたね）」の名が示す通り、のんびりとした雰囲気と癒やし系の声が魅力。マイペースな配信で、リスナーに心地よい休息の時間を提供している。</p>
            </div>
        </section>
    </main>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>

</html>
