<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erina Makina | Phase Connect Archive</title>
    <link rel="stylesheet" href="char-base.css">
</head>

<body>
    <div class="bg-fx"></div>
    <nav class="nav">
        <a href="../phaseconnect_index.html" class="nav-brand">PHASE CONNECT ARCHIVE</a>
    </nav>

    <header class="hero">
        <h1 class="hero-name">Erina Makina</h1>
        <p class="hero-subtitle">エリナ・マキナ</p>
    </header>

    <main class="container">
        <section class="section reveal">
            <h2 class="section-title">PROFILE</h2>
            <div class="profile-card">
                <div class="data-grid">
                    <div class="data-item"><span class="label">ID</span><span class="value">PH-02-06</span></div>
                    <div class="data-item"><span class="label">Phase</span><span class="value">02 - ALiAS</span></div>
                </div>
            </div>
        </section>

        <section class="section reveal">
            <h2 class="section-title">DESCRIPTION</h2>
            <div class="description">
                <p>ALiASのメンバー。アンドロイドの少女。冷静沈着な分析力と、時折見せる人間味のある反応が魅力。ゲーム実況や技術系の雑談など、多才な一面を見せている。</p>
            </div>
        </section>
    </main>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>

</html>
