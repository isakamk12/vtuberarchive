<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星降いく | PRISM Project Archive</title>
    <link rel="stylesheet" href="char-base.css">
</head>

<body>
    <div class="bg-refract"></div>
    <nav class="nav">
        <a href="../prismproject_index.html" class="nav-brand">PRISM PROJECT ARCHIVE</a>
    </nav>

    <header class="hero">
        <h1 class="hero-name">星降いく</h1>
        <p class="hero-subtitle">HOSHIFURI IKU</p>
    </header>

    <main class="container">
        <section class="section reveal">
            <h2 class="section-title">PROFILE</h2>
            <div class="profile-card">
                <div class="data-grid">
                    <div class="data-item"><span class="label">GEN</span><span class="value">1期生</span></div>
                    <div class="data-item"><span class="label">ID</span><span class="value">PRM-01-01</span></div>
                </div>
            </div>
        </section>

        <section class="section reveal">
            <h2 class="section-title">DESCRIPTION</h2>
            <div class="description">
                <p>PRISM
                    Projectの1期生。明るく元気な性格で、リスナーに元気を届ける太陽のような存在。高い歌唱唱力と、親しみやすいトークで国内外のファンから愛されている。プロジェクトの草創期を支えた中心メンバーの一人。
                </p>
            </div>
        </section>
    </main>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>

</html>
