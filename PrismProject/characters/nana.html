<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アステリアなな | PRISM Project Archive</title>
    <link rel="stylesheet" href="char-base.css">
</head>

<body>
    <div class="bg-refract"></div>
    <nav class="nav">
        <a href="../prismproject_index.html" class="nav-brand">PRISM PROJECT ARCHIVE</a>
    </nav>

    <header class="hero">
        <h1 class="hero-name">アステリアなな</h1>
        <p class="hero-subtitle">ASTERIA NANA</p>
    </header>

    <main class="container">
        <section class="section reveal">
            <h2 class="section-title">PROFILE</h2>
            <div class="profile-card">
                <div class="data-grid">
                    <div class="data-item"><span class="label">GEN</span><span class="value">7期生</span></div>
                    <div class="data-item"><span class="label">ID</span><span class="value">PRM-07-03</span></div>
                </div>
            </div>
        </section>

        <section class="section reveal">
            <h2 class="section-title">DESCRIPTION</h2>
            <div class="description">
                <p>PRISM Projectの7期生。星のように輝くパフォーマンスと、独創的な配信スタイルが特徴。プロジェクトの最新世代として、次世代のバーチャルタレント像を模索し、多角的に活動している。</p>
            </div>
        </section>
    </main>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>

</html>
