<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亜音ノン | PRISM Project Archive</title>
    <link rel="stylesheet" href="char-base.css">
</head>

<body>
    <div class="bg-refract"></div>
    <nav class="nav">
        <a href="../prismproject_index.html" class="nav-brand">PRISM PROJECT ARCHIVE</a>
    </nav>

    <header class="hero">
        <h1 class="hero-name">亜音ノン</h1>
        <p class="hero-subtitle">ANON NON</p>
    </header>

    <main class="container">
        <section class="section reveal">
            <h2 class="section-title">PROFILE</h2>
            <div class="profile-card">
                <div class="data-grid">
                    <div class="data-item"><span class="label">GEN</span><span class="value">4期生</span></div>
                    <div class="data-item"><span class="label">ID</span><span class="value">PRM-04-03</span></div>
                </div>
            </div>
        </section>

        <section class="section reveal">
            <h2 class="section-title">DESCRIPTION</h2>
            <div class="description">
                <p>PRISM Projectの4期生。独特の感味と、リスナーを引き込むトークスキルが特徴。自由奔放な性格でありながら、表現に対しては非常に真摯な姿勢を見せ、そのギャップがファンを惹きつけている。</p>
            </div>
        </section>
    </main>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>

</html>
