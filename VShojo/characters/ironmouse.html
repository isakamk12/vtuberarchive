<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ironmouse | VShojo Archive</title>
    <link rel="stylesheet" href="char-base.css">
</head>

<body>
    <header class="hero">
        <h1 class="hero-name">IRONMOUSE</h1>
        <p class="hero-subtitle">THE DEMON QUEEN / SUPREME LEADER</p>
    </header>

    <main class="container">
        <section class="section reveal">
            <h2 class="section-label">IDENTIFIER</h2>
            <div class="profile-card">
                <div class="data-grid">
                    <div class="data-item"><span class="label">GROUP</span><span class="value">GLOBAL</span></div>
                    <div class="data-item"><span class="label">STATUS</span><span class="value">ACTIVE</span></div>
                </div>
            </div>
        </section>

        <section class="section reveal">
            <h2 class="section-label">RECORDS</h2>
            <div class="description">
                <p>VShojoの象徴的存在。圧倒的な歌唱唱と、見る者を魅了するカリスマ性、そしてリスナーへの深い愛情を持つ。バーチャルストリーマー界の女王として君臨し、常に新しい歴史を刻み続けている。彼女の歌声は、地獄すらも支配するほどの魔力を秘めている。
                </p>
            </div>
        </section>
    </main>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>

</html>
