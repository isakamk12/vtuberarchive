<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kson | VShojo Archive</title>
    <link rel="stylesheet" href="char-base.css">
</head>

<body>
    <header class="hero">
        <h1 class="hero-name">KSON</h1>
        <p class="hero-subtitle">BARBARIC BOSS / LEGENDARY DELINQUENT</p>
    </header>

    <main class="container">
        <section class="section reveal">
            <h2 class="section-label">IDENTIFIER</h2>
            <div class="profile-card">
                <div class="data-grid">
                    <div class="data-item"><span class="label">GROUP</span><span class="value">JAPAN / NOVA</span></div>
                    <div class="data-item"><span class="label">STATUS</span><span class="value">ACTIVE</span></div>
                </div>
            </div>
        </section>

        <section class="section reveal">
            <h2 class="section-label">RECORDS</h2>
            <div class="description">
                <p>VShojo
                    Japanのレジェンド。型破りなスタイルと、圧倒的な行動力、そして多くのファンを惹きつける熱い心を持つ。バーチャル界の「総長」として、常に最前線を走り抜け、新しいエンターテインメントの形を示し続けている。
                </p>
            </div>
        </section>
    </main>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>

</html>
