<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="char-base.css">
    <style>
        :root {
            --char-color: #29b8ff;
            --char-glow: rgba(41, 184, 255, 0.5);
            --char-color-soft: rgba(41, 184, 255, 0.08);
            --char-border: rgba(41, 184, 255, 0.25);
        }
    </style>
</head>
<body>
    <div class="cp-bg"></div>
    <nav class="cp-nav">
        <a href="../rkmusic_index.html" class="cp-back">
            <i class="fa-solid fa-chevron-left"></i> BACK TO INDEX
        </a>
        <div class="cp-nav-gen">Fused</div>
    </nav>

    <section class="cp-hero">
        <div class="cp-bg-letter">D</div>
        <div class="cp-hero-content">
            <div class="cp-gen-label">Fused / Artist</div>
            <h1 class="cp-hero-name">Diα</h1>
            <span class="cp-hero-en">Dia</span>
            <div class="cp-chara-desc">
                2026年2月に設立された新レーベル「Fused」の所属アーティスト。次世代のバーチャリティを歌声で描き出し、現実と仮想の境界線を音楽で繋ぐ。

            <div class="cp-tags">
                <span class="cp-tag cp-tag-primary">VSinger</span>
                <span class="cp-tag cp-tag-muted">Fused</span>
                <span class="cp-tag cp-tag-muted">VIRTUAL</span>
            </div>
        </div>
        <div class="cp-hero-visualizer">
            <div class="cp-vis-bar"></div>
            <div class="cp-vis-bar"></div>
            <div class="cp-vis-bar"></div>
            <div class="cp-vis-bar"></div>
            <div class="cp-vis-bar"></div>
        </div>
    </section>

    <section class="cp-section cp-reveal">
        <h2 class="cp-section-title">PROFILE</h2>
        <div class="cp-grid">
            <div class="cp-card">
                <h3>INFORMATION</h3>
                <ul>
                    <li><strong>Name:</strong> Diα (ディア)</li>
                    <li><strong>Label:</strong> Fused (2026.02〜)</li>
                    <li><strong>Affiliation:</strong> RK Music</li>
                </ul>

    </section>

    <footer class="cp-footer">
        © 2026 VTuber Archive Project.
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const reveals = document.querySelectorAll('.cp-reveal');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('active');
                });
            }, { threshold: 0.1 });
            reveals.forEach(el => observer.observe(el));
        });
    </script>
</body>
