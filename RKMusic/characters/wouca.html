<!DOCTYPE html>
<html lang="ja">
<head>

        }

</head>
<body>
    <div class="cp-bg"></div>
    <nav class="cp-nav">
        <a href="../rkmusic_index.html" class="cp-back">

        </a>
        <div class="cp-nav-gen">Independent Artist</div>

    <section class="cp-hero">
        <div class="cp-bg-letter">W</div>
        <div class="cp-hero-content">
            <div class="cp-gen-label">Artist</div>
            <h1 class="cp-hero-name">wouca</h1>
            <span class="cp-hero-en">wouca</span>

    <footer class="cp-footer">
        © 2026 VTuber Archive Project.
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const reveals = document.querySelectorAll('.cp-reveal');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('active');
                });
            }, { threshold: 0.1 });
            reveals.forEach(el => observer.observe(el));
        });
    </script>
