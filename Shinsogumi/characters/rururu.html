<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生返るるる | SHINSOGUMI Archive</title>
    <link rel="stylesheet" href="char-base.css">
</head>

<body>
    <nav class="nav">
        <a href="../shinsogumi_index.html" class="nav-brand">SHINSOGUMI_DATABASE</a>
    </nav>

    <header class="hero">
        <h1 class="hero-name">RURURU</h1>
        <p class="hero-subtitle">生返るるる</p>
    </header>

    <main class="container">
        <section class="section reveal">
            <h2 class="section-title">SYSTEM_PROFILE</h2>
            <div class="profile-card">
                <div class="data-grid">
                    <div class="data-item"><span class="label">ROLE</span><span class="value">6TH_DAUGHTER</span></div>
                    <div class="data-item"><span class="label">NODE_ID</span><span class="value">RRR-06</span></div>
                </div>
            </div>
        </section>

        <section class="section reveal">
            <h2 class="section-title">LOG_CONTENT</h2>
            <div class="description">
                <p>深層家の六女。どこか儚げでありながら、深層組らしい狂気とユーモアを併せ持つ。リスナーの懐にスッと入り込むような配信スタイルで、独自の世界観を構築している。彼女の言葉一つひとつが、深層の住人たちを魅了する。
                </p>
            </div>
        </section>
    </main>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>

</html>
