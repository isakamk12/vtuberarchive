    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const r = document.querySelectorAll('.cp-reveal');
            const o = new IntersectionObserver(e => e.forEach(x => x.isIntersecting && x.target.classList.add('active')), { threshold: 0.1 });
            r.forEach(el => o.observe(el));
        });
    </script>
