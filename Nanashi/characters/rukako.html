<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大浦るかこ - 774inc. Archive</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="char-base.css">
</head>

<body>
    <div class="bg-fx"></div>
    <nav class="nav"><a href="../nanashi_index.html" class="nav-brand"><i class="fa-solid fa-7"></i> 774inc.</a></nav>
    <header class="hero">
        <h1 class="hero-name">大浦るかこ</h1>
        <p class="hero-subtitle">Ooura Rukako</p>
    </header>
    <main class="container">
        <section class="section reveal">
            <h2 class="section-title">PROFILE</h2>
            <div class="profile-card">
                <div class="data-grid">
                    <div class="data-item"><span class="label">Unit</span><span class="value">有閑喫茶あにまーれ (AniMare)</span>
                    </div>
                    <div class="data-item"><span class="label">Debut</span><span class="value">2021.02.06</span></div>
                    <div class="data-item"><span class="label">Status</span><span class="value">Graduated / Former
                            Staff</span></div>
                </div>
            </div>
        </section>
        <section class="section reveal">
            <h2 class="section-title">DESCRIPTION</h2>
            <p class="description">あにまーれのメンバーとして活躍後、運営スタッフへ転向するという異例の経歴を持つ。2024年3月に退職・卒業となったが、その多才さは今も語り継がれている。</p>
        </section>
    </main>
    <script>document.addEventListener('DOMContentLoaded', () => { const reveals = document.querySelectorAll('.reveal'); const observer = new IntersectionObserver((entries) => { entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); }); }, { threshold: 0.1 }); reveals.forEach(el => observer.observe(el)); });</script>
</body>

</html>
