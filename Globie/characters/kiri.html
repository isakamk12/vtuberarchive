<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiri Kilovolt — Globie</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="char-base.css">
</head>

<body>
    <div class="cp-bg"></div>
    <nav class="cp-nav">
        <a href="../globie_index.html" class="cp-back"><i class="fa-solid fa-chevron-left"></i> BACK TO Globie</a>
        <span class="cp-nav-gen">2nd Generation // Solstia</span>
    </nav>
    <section class="cp-hero">
        <div class="cp-bg-letter">K</div>
        <div class="cp-hero-content">
            <div class="cp-gen-label">Globie // Solstia</div>
            <h1 class="cp-hero-name">Kiri</h1>
            <span class="cp-hero-en">Kiri Kilovolt (キリ キロボルト)</span>
            <p class="cp-chara-desc">キリンのレーサー。2025年9月に卒業。その後、別名義（Shizukou等）での活動再開がコミュニティで話題となった。</p>
            <div class="cp-tags">
                <span class="cp-tag">#Giraffe</span>
                <span class="cp-tag">#Racer</span>
                <span class="cp-tag">#Graduated</span>
            </div>
        </div>
    </section>
    <div class="cp-section cp-reveal">
        <h2 class="cp-section-title">ARCHIVE DATA</h2>
        <div class="cp-grid">
            <div class="cp-card">
                <h3>PROFILE</h3>
                <table class="cp-table">
                    <tr>
                        <th>STATUS</th>
                        <td>Graduated</td>
                    </tr>
                    <tr>
                        <th>UNIT</th>
                        <td>Solstia</td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
    <footer class="cp-footer">
        <p>© 2026 Globie Archive</p>
    </footer>
    <script>document.addEventListener('DOMContentLoaded', () => { const r = document.querySelectorAll('.cp-reveal'); const o = new IntersectionObserver(e => e.forEach(x => x.isIntersecting && x.target.classList.add('active')), { threshold: 0.1 }); r.forEach(el => o.observe(el)); });</script>
</body>

</html>
