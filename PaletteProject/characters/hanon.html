<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香鳴 ハノン | Palette Project アーカイブ</title>
    <link rel="stylesheet" href="char-base.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="bg-fx"></div>
    <nav class="nav">
        <a href="../paletteproject_index.html" class="nav-brand">PALETTE PROJECT ARCHIVE</a>
    </nav>

    <header class="hero">
        <h1 class="hero-name">香鳴 ハノン</h1>
        <p class="hero-subtitle">Kanari Hanon</p>
    </header>

    <main class="container">
        <section class="section reveal">
            <h2 class="section-title">PROFILE</h2>
            <div class="profile-card">
                <div class="data-grid">
                    <div class="data-item"><span class="label">Gen</span><span class="value">4期生</span></div>
                    <div class="data-item"><span class="label">Unit</span><span class="value">Sputrip</span></div>
                </div>
            </div>
        </section>

        <section class="section reveal">
            <h2 class="section-title">DESCRIPTION</h2>
            <div class="description">
                <p>パレプロの4期生。シティ・ポップユニット「Sputrip」のメンバーとして活躍。透明感のある歌声と洗練されたパフォーマンスが特徴。2026年には初のソロワンマンライブを控えるなど、個人としての飛躍も目覚ましい。
                </p>
            </div>
        </section>
    </main>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>

</html>
