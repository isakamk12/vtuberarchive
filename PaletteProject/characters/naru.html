<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六連星 なる | Palette Project アーカイブ</title>
    <link rel="stylesheet" href="char-base.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="inactive">
    <div class="bg-fx"></div>
    <nav class="nav">
        <a href="../paletteproject_index.html" class="nav-brand">PALETTE PROJECT ARCHIVE</a>
    </nav>
    <header class="hero">
        <h1 class="hero-name">六連星 なる</h1>
        <p class="hero-subtitle">Mutsuraboshi Naru</p>
    </header>
    <main class="container">
        <section class="section reveal">
            <h2 class="section-title">ARCHIVE PROFILE</h2>
            <div class="profile-card">
                <div class="data-grid">
                    <div class="data-item"><span class="label">Status</span><span class="value">契約終了 (Inactive)</span></div>
                    <div class="data-item"><span class="label">Generation</span><span class="value">5期研究生</span></div>
                </div>
            </div>
            <div class="description-card reveal">
                <p>パレプロの5期研究生として活動。多くの夢と希望を抱いて活動した軌跡は、ファンの記憶に残っている。現在は活動を終了しており、本ページはアーカイブとして保存されている。</p>
            </div>
        </section>
    </main>
    <footer style="text-align:center; padding:4rem; opacity:0.3; font-size:0.8rem;">
        © 2026 VTuber Archive Project - Palette Project Databank.
    </footer>
    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
