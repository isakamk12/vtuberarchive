<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>愛染 アネラ | Palette Project アーカイブ</title>
    <link rel="stylesheet" href="char-base.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="trainee">
    <div class="bg-fx"></div>
    <nav class="nav">
        <a href="../paletteproject_index.html" class="nav-brand">PALETTE PROJECT ARCHIVE</a>
    </nav>
    <header class="hero">
        <h1 class="hero-name">愛染 アネラ</h1>
        <p class="hero-subtitle">Aizen Anela</p>
    </header>
    <main class="container">
        <section class="section reveal">
            <h2 class="section-title">PROFILE</h2>
            <div class="profile-card">
                <div class="data-grid">
                    <div class="data-item"><span class="label">Status</span><span class="value">研究生 (Trainee)</span></div>
                    <div class="data-item"><span class="label">Generation</span><span class="value">5期生</span></div>
                    <div class="data-item"><span class="label">Oshi Mark</span><span class="value">🎀👼</span></div>
                </div>
            </div>
            <div class="description-card reveal">
                <p>パレプロの5期研究生。次世代のバーチャルアイドルを目指し、日々研鑽を積んでいる。研究生としての活動を通じて、個性的な魅力とパフォーマンススキルを磨き、正規メンバーへの昇格を目指す期待の星。</p>
            </div>
        </section>
    </main>
    <footer style="text-align:center; padding:4rem; opacity:0.3; font-size:0.8rem;">
        © 2026 VTuber Archive Project - Palette Project Databank.
    </footer>
    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
