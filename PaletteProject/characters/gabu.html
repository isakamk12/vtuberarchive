<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鎖乙女 がぶ | Palette Project アーカイブ</title>
    <link rel="stylesheet" href="char-base.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="bg-fx"></div>
    <nav class="nav">
        <a href="../paletteproject_index.html" class="nav-brand">PALETTE PROJECT ARCHIVE</a>
    </nav>

    <header class="hero">
        <h1 class="hero-name">鎖乙女 がぶ</h1>
        <p class="hero-subtitle">Saotome Gabu</p>
    </header>

    <main class="container">
        <section class="section reveal">
            <h2 class="section-title">PROFILE</h2>
            <div class="profile-card">
                <div class="data-grid">
                    <div class="data-item"><span class="label">Gen</span><span class="value">6期研究生</span></div>
                    <div class="data-item"><span class="label">Role</span><span class="value">Trainee</span></div>
                </div>
            </div>
        </section>

        <section class="section reveal">
            <h2 class="section-title">DESCRIPTION</h2>
            <div class="description">
                <p>パレプロの6期研究生。エッジの効いたキャラクターと、予測不能な面白さを秘める。新世代のパレプロを担うべく、研究生として新たな風を吹き込んでいる。</p>
            </div>
        </section>
    </main>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>

</html>
