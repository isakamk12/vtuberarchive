<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>透乃おと | Varium Archive</title>
    <link rel="stylesheet" href="char-base.css">
</head>

<body>
    <header class="hero">
        <h1 class="hero-name">OTO</h1>
        <p class="hero-subtitle">透乃おと / Tono Oto</p>
    </header>

    <main class="container">
        <section class="section reveal">
            <h2 class="section-title">PROFILE</h2>
            <div class="profile-card">
                <div class="data-grid">
                    <div class="data-item"><span class="label">GEN</span><span class="value">3期生</span></div>
                    <div class="data-item"><span class="label">ID</span><span class="value">VAR-03-01</span></div>
                </div>
            </div>
        </section>

        <section class="section reveal">
            <h2 class="section-title">STORY</h2>
            <div class="description">
                <p>ぶいありうむっ！3期生。透き通るような純粋さと、音楽をこよなく愛する心を持つ。彼女が奏でる「音」は、デジタル世界の喧騒を忘れさせ、穏やかな星空の広がる場所へと導いてくれる。</p>
            </div>
        </section>
    </main>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>

</html>
