<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>七瀬える | Varium Archive</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="char-base.css">
    <style>
        :root {
            --char-color: #888;
            --char-color-alt: #bbb;
            --char-rgb: 136, 136, 136;
        }
        .va-hero-badge { background: #eee; color: #666; }
    </style>
</head>
<body>
    <div class="va-bg">
        <div class="va-bg-shape va-shape-1"></div>
        <div class="va-bg-shape va-shape-2"></div>
    </div>

    <nav class="va-nav">
        <a href="../varium_index.html" class="va-back">
            <i class="fa-solid fa-chevron-left"></i> BACK TO HUB
        </a>
    </nav>

    <header class="va-hero">
        <div class="va-hero-badge">ALUMNI / 1期生</div>
        <h1 class="va-hero-name-jp">七瀬える</h1>
        <p class="va-hero-name-en">Nanase Eru</p>
        <div class="va-hero-tags">
            <span class="va-tag">#卒業生</span>
            <span class="va-tag">#2024年6月30日卒業</span>
            <span class="va-tag">#1期生</span>
        </div>

    <main class="va-container">
        <section class="va-card reveal">
            <h2 class="va-section-title"><i class="fa-solid fa-ribbon"></i> GRADUATE PROFILE</h2>
            <div class="va-bio">
                <p>Varium 1期生として活動したアイドル。2024年6月30日をもってグループを卒業。その美声と明るい人柄は、多くの後輩たちに多大な影響を与え、今もなおVariumの魂の一部として語り継がれている。彼女の歩んだ軌跡は、このアーカイブに永遠に刻まれる。</p>
            </div>
        </section>
    </main>

    <footer class="va-footer">
        <p>&copy; 2026 VTuber Archive Project. Unofficial Fan Site.</p>
    </footer>

    <script src="../../mobile_optimize.js"></script>
    <script>
        document.querySelectorAll('.reveal').forEach(el => el.classList.add('active'));
    </script>
</body>
</html>
