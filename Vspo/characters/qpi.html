<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神成きゅぴ - VSPO! Record</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&family=Noto+Sans+JP:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="char-base.css">
    <style>
        :root {
            --char-primary: #ffd700;
            /* Gold/Yellow */
            --char-primary-rgb: 255, 215, 0;
            --char-secondary: #00f3ff;
        }
    </style>
</head>

<body class="char-theme">
    <div class="char-bg"></div>
    <header class="char-header">
        <a href="../vspo_index.html" class="back-link"><i class="fa-solid fa-chevron-left"></i> BACK TO ROSTER</a>
        <div class="char-logo">VSPO!</div>
    </header>

    <main class="char-container">
        <aside class="info-sidebar">
            <div class="avatar-box">
                <i class="fa-solid fa-gamepad"></i>
            </div>
            <div class="quick-stats">
                <div class="stat-row" style="flex-direction: column; gap: 5px;">
                    <span class="stat-label">GREETING</span>
                    <span class="stat-value" style="font-size: 0.85rem;">「雷鳴ります」</span>
                </div>
            </div>
        </aside>

        <section class="detail-content">
            <div class="char-title">
                <h1>Qpi Kaminari</h1>
                <div class="unit">AGENT // VSPO! JP</div>
            </div>

            <div class="data-card">
                <h2><i class="fa-solid fa-crosshairs"></i> GAME STYLE & ACHIEVEMENTS</h2>
                <p>ゲーム（特にFPS）の実力は非常に高く、先輩からも一目置かれている。</p>
                <div class="tag-list">
                    <span>Apex Legends</span><span>FPS</span>
                </div>
            </div>

            <div class="data-card">
                <h2><i class="fa-solid fa-id-card"></i> PERSONALITY & TRIVIA</h2>
                <p>金髪で明るい「ジャパニーズギャル」なルックスとハイテンションな性格。</p>
                <p>ギャルでありながら、メンバーからは「バブ」「赤ちゃん」といじられる愛らしい一面を持っている。</p>
                <p>ぶいすぽっ！には途中から加入したメンバーの一人。</p>
            </div>
        </section>
    </main>
</body>

</html>
