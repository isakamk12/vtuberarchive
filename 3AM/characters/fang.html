<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fang | 3AMアーカイブ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="char-base.css">
    <style>
        :root {
            --char-color: #F0FFFF;
            --char-rgb: 240, 255, 255;
        }
    </style>
</head>
<body>
    <div class="char-bg"></div>

    <nav>
        <a href="../3am_index.html" class="char-back">
            <i class="fa-solid fa-skull"></i> 脱出する (ESCAPE)
        </a>
    </nav>

    <header class="char-hero">
        <div class="char-read">ファング</div>
        <h1 class="char-name">Fang</h1>
        <div class="char-tags">
            <span class="char-tag">Other Members</span>
            
        </div>
        <p class="char-catchphrase" style="margin-top: 2rem; font-style: italic; color: var(--char-color); opacity: 0.8;">「地球温暖化で解凍された原始人」</p>
    </header>

    <main class="char-container">
        <section class="char-section">
            <h2>プロフィール (PROFILE)</h2>
            <div class="char-profile">
                <p><strong>種族:</strong> 原始人</p>

            </div>
            <div class="char-bio" style="margin-top: 1.5rem; border-top: 1px dashed #444; padding-top: 1.5rem;">
                <p>地球温暖化の影響で現代に解凍された、最高に可愛い原始人。Meatと共に3AMの原始人枠（？）を支える。</p>
            </div>
        </section>

        
    </main>

    <footer class="char-footer">
        <p>© 2026 VTuber Archive Project. 非公式ファンページ。</p>
    </footer>

    <script src="../../mobile_optimize.js"></script>
    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.style.opacity = "1";
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.char-section').forEach(el => {
            el.style.opacity = "0";
            el.style.transition = "opacity 0.8s ease-out";
            observer.observe(el);
        });
    </script>
</body>
</html>
