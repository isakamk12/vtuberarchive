<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔王トゥルシー | VEE Archive</title>
    <link rel="stylesheet" href="char-base.css">
</head>

<body>
    <header class="hero">
        <h1 class="hero-name">TULSI</h1>
        <p class="hero-subtitle">魔王トゥルシー</p>
    </header>

    <main class="container">
        <section class="section reveal">
            <span class="section-label">IDENTIFIER</span>
            <div class="profile-card">
                <div class="data-grid">
                    <div class="data-item"><span class="label">GROUP</span><span class="value">VEE</span></div>
                    <div class="data-item"><span class="label">PREVIOUS_ID</span><span class="value">NIGHTMARE</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="section reveal">
            <span class="section-label">LOGS</span>
            <div class="description">
                <p>VEE所属。かつては「トゥルシー・ナイトメア」としてその名を轟かせていた。魔王としての圧倒的な威厳と、時折見せる親しみやすさのギャップでリスナーを征服している。VEEの多様性を象徴する存在の一人。
                </p>
            </div>
        </section>
    </main>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>

</html>
