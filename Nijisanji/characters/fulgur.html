<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member | NIJISANJI ARCHIVE</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; background: #050510; color: #f5f5f7; font-family: "Noto Sans JP", system-ui, -apple-system, sans-serif; display: grid; place-items: center; }
        .back { position: fixed; top: 24px; left: 24px; color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.8rem; letter-spacing: 0.08em; }
        .card { text-align: center; padding: 48px 24px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
        h1 { font-size: clamp(1.4rem, 4vw, 2.2rem); margin-bottom: 8px; }
        .sub { color: rgba(255,255,255,0.5); letter-spacing: 0.2em; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 18px; }
        .note { color: rgba(255,255,255,0.7); font-size: 0.9rem; }
    </style>
</head>
<body>
    <a class="back" href="../nijisanji_index.html">← BACK TO DATABASE</a>
    <main class="card">
        <h1 id="memberName">Member</h1>
        <div class="sub">NIJISANJI ARCHIVE</div>
        <p class="note">このページは準備中です。</p>
    </main>
    <script>
        const file = location.pathname.split('/').pop() || '';
        const base = file.toLowerCase().endsWith('.html') ? file.slice(0, -5) : file;
        const display = base.replace(/[_-]+/g, ' ').split(' ').map(s => s ? s[0].toUpperCase() + s.slice(1) : '').join(' ');
        document.getElementById('memberName').textContent = display || 'Member';
        document.title = `${display || 'Member'} | NIJISANJI ARCHIVE`;
    </script>
</body>
</html>
