<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>剣持刀也 | にじさんじアーカイブ</title>
    <link rel="stylesheet" href="char-base.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="bg-fx"></div>
    <nav class="nav">
        <a href="../nijisanji_index.html" class="nav-brand">NIJISANJI ARCHIVE</a>
    </nav>

    <header class="hero">
        <h1 class="hero-name">剣持刀也</h1>
        <p class="hero-subtitle">Kenmochi Toya</p>
    </header>

    <main class="container">
        <section class="section reveal">
            <h2 class="section-title">PROFILE</h2>
            <div class="profile-card">
                <div class="data-grid">
                    <div class="data-item"><span class="label">Birthday</span><span class="value">8月22日</span></div>
                    <div class="data-item"><span class="label">Debut</span><span class="value">2018年3月15日</span></div>
                    <div class="data-item"><span class="label">Gen</span><span class="value">2期生 (ろふまお)</span></div>
                </div>
            </div>
        </section>

        <section class="section reveal">
            <h2 class="section-title">DESCRIPTION</h2>
            <div class="description">
                <p>16歳の高校2年生。剣道部所属。鋭いツッコミと圧倒的な語彙力によるマシュマロ捌きで知られる。ROF-MAOのメンバーとしても活動中。リスナーとのプロレス的なやり取りが定番。</p>
            </div>
        </section>
    </main>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>

</html>
